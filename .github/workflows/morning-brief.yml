name: Morning Brief

on:
  # 11:00 UTC = 7:00 AM EDT (UTC-4, summer)
  # 12:00 UTC = 7:00 AM EST (UTC-5, winter)
  # Both fire so the brief lands near 7 AM year-round regardless of DST.
  # On days when both fire (DST transition days), the second delivery is a
  # duplicate — acceptable given the low frequency.
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: pytest tests/ -v

      - name: Send morning brief
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TIMEZONE: ${{ vars.TIMEZONE || 'America/New_York' }}
          LATITUDE: ${{ vars.LATITUDE || '40.6782' }}
          LONGITUDE: ${{ vars.LONGITUDE || '-73.9442' }}
          NEWS_COUNTRY: ${{ vars.NEWS_COUNTRY || 'us' }}
        run: python src/brief.py
